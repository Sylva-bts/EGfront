<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Escape the Ghost - Demo</title>
   <link rel="stylesheet" href="GhostRD.css">
   <link rel="stylesheet" href="powerBay-violet.css">
   <link rel="icon" type="image/jpeg" sizes="32x32" href="ima/logoG.jpeg">
</head>
<body>
   <header>
      <h4>Escape the Ghost</h4>
      <div class="solde" id="Solde" >Solde:<span>10000.00</span> USD</div> 
   </header>
   <div class="interface">

      <div class="cadreJeux">
      <div class="demo-head">
         <span class="demo-pill">Version demo</span>
         <div class="cote" id="cote">×<span>1.0</span></div>
      </div>
      <div class="img">
      <img src="ima/dance.gif" width="250px" height="150px" style="mix-blend-mode:multiply;" class="stick1" id="stick1">
      <div class="Acteurs">
   <img src="ima/R.gif" width="150px" height="150px" style="mix-blend-mode:multiply;" class="stick" id="stick0">
   
      <img src="ima/Gost.jpg" width="100px" style="mix-blend-mode:multiply;" class="Ghost" id="Ghost">
      </div>
      </div>
      <!---pouvoirs-->
<div class="pouvoir" id="pouvoir">
      <div class="vitesse" id="vitesse">
         <button class="btn-pouvoir" type="button" onclick="Vitesse()" id="btn-vitesse" aria-label="Utiliser la vitesse">⚡</button>
      </div>
      <div class="gel" id="gel">
         <button class="btn-pouvoir" type="button" onclick="Gel()" id="btn-gel" aria-label="Utiliser le gel">❄️</button>
      </div>
      <div class="bouclié" id="bouclié">
         <button class="btn-pouvoir" type="button" onclick="Bouclier()" id="btn-bouclier" aria-label="Utiliser le bouclier">🛡️</button>
      </div>
      <div class="sec_chance" id="sec_chance">
         <button class="btn-pouvoir" type="button" onclick="SecondeChance()" id="btn-sec-chance" aria-label="Utiliser la seconde chance">🍀</button>
      </div>
      <div class="vision" id="vision">
         <button class="btn-pouvoir" type="button" onclick="Vision()" id="btn-vision" aria-label="Utiliser la vision">👀</button>
      </div>
      </div>
      <div class="commandes">
         <div class="mise">
            <p>Placer la mise</p>
            <input type="number" placeholder="Inscriver votre mise" id="Mise" min="0.26" step="0.01" value="">
            <button class="btn-mise" type="button" onclick="Miser()" id="btn-mise">Miser</button>
         </div>
         <button class="retirer" type="button" onclick="retrait()" id="btn-rtt">Saute !!!</button>
      </div>
   </div>
   
      <div class="historique" id="Story"></div>
      <script src="app-api.js?v=20260530-api-base"></script>
      <script src="GhostRD.js?v=20260707-minbet"></script>
      <script src="powers.js"></script>
   </div>
</body>
</html>
